server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: search-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/flights?currentSchema=search}
    username: ${SPRING_DATASOURCE_USERNAME:flights}
    password: ${SPRING_DATASOURCE_PASSWORD:flights}
  flyway:
    schemas: search
    default-schema: search
    create-schemas: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: search-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
